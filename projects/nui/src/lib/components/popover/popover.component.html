<div
  class="nui-popover"
  [class]="mainClasses()"
  role="dialog"
  [@fadeIn]="'true'"
  [attr.data-position]="effectiveConfig().position"
  [attr.id]="popoverId()"
  [style.max-width]="effectiveConfig().maxWidth"
  [style.min-width]="effectiveConfig().minWidth"
>
  @if (effectiveConfig().showArrow) {
    <div class="nui-popover__arrow"></div>
  }
  <div class="nui-popover__content">
    @if (isTemplate()) {
      <ng-container *ngTemplateOutlet="$any(content()); context: context()"></ng-container>
    } @else if (isComponent()) {
      <ng-container #dynamicComponent></ng-container>
    } @else {
      <div [innerHTML]="content()"></div>
    }
  </div>
</div>
