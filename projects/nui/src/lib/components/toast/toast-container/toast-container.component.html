<div
  class="nui-toast-container__wrapper"
  role="region"
  aria-live="polite"
  aria-relevant="additions"
  aria-atomic="false"
  [attr.aria-label]="_i18n().notifications"
>
  @for (toast of toasts(); track toast.id) {
    <nui-toast
      [toastRef]="toast"
      (closed)="removeToast(toast.id)"
    ></nui-toast>
  }
</div>
