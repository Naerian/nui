<div class="nui-modal-dialog-dock" role="toolbar" aria-label="Modales minimizados">
  @for (item of dockItems(); track trackById($index, item)) {
    <button
      type="button"
      class="nui-modal-dialog-dock__item"
      [class]="item.color ? 'nui-modal-dialog-dock__item--' + item.color : ''"
      (click)="restore(item)"
      [attr.aria-label]="'Restaurar: ' + item.title"
      [title]="item.title"
    >
      @if (item.icon) {
        <i [class]="item.icon + ' nui-modal-dialog-dock__item-icon'" aria-hidden="true"></i>
      }
      <span class="nui-modal-dialog-dock__item-title">{{ item.title }}</span>
      <i class="ri-corner-right-up-line nui-modal-dialog-dock__item-restore" aria-hidden="true"></i>
    </button>
  }
</div>
