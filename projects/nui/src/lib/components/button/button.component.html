<button
  #btnNative
  class="nui-btn"
  [ngClass]="hostClasses()"
  [disabled]="disabled() || loading()"
  [attr.type]="effectiveType()"
  [attr.aria-label]="computedAriaLabel()"
  [attr.aria-busy]="loading()"
  [title]="title()"
  (click)="handleClick($event)"
>
  @if (loading() && effectiveLoadingPosition() === 'start') {
    <span class="nui-btn__spinner nui-btn__spinner--start" aria-hidden="true"></span>
  }

  @if (icon() && effectiveIconPosition() === ButtonIconPositionEnum.START && !loading()) {
    <i [class]="icon()" class="nui-btn__icon nui-btn__icon--start" aria-hidden="true"></i>
  }

  <span
    class="nui-btn__content"
    [class.nui-btn__content--hidden]="
      loading() && effectiveLoadingPosition() === ButtonLoadingPositionEnum.CENTER
    "
  >
    <ng-content></ng-content>
    @if (label()) {
      <span>{{ label() }}</span>
    }
  </span>

  @if (loading() && effectiveLoadingPosition() === ButtonLoadingPositionEnum.CENTER) {
    <span class="nui-btn__spinner nui-btn__spinner--center" aria-hidden="true"></span>
  }
  @if (icon() && effectiveIconPosition() === ButtonIconPositionEnum.END && !loading()) {
    <i [class]="icon()" class="nui-btn__icon nui-btn__icon--end" aria-hidden="true"></i>
  }
  @if (loading() && effectiveLoadingPosition() === ButtonLoadingPositionEnum.END) {
    <span class="nui-btn__spinner nui-btn__spinner--end" aria-hidden="true"></span>
  }
</button>
