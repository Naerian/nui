<div
  class="nui-tooltip"
  role="tooltip"
  [@fadeIn]="'true'"
  [attr.data-position]="position()"
  [attr.id]="tooltipId()"
>
  @if (showArrow()) {
    <div class="nui-tooltip__arrow"></div>
  }
  <div class="nui-tooltip__content">
    @if (isTemplate()) {
      <!-- Fix 4: sintaxis moderna de ngTemplateOutlet -->
      <ng-container [ngTemplateOutlet]="$any(content())"></ng-container>
    } @else if (allowHtml()) {
      <!--
        [innerHTML] usa el sanitizador integrado de Angular.
        Si el contenido viene de bypassSecurityTrustHtml(), revisar con el equipo de seguridad.
      -->
      <div [innerHTML]="content()"></div>
    } @else {
      {{ content() }}
    }
  </div>
</div>
