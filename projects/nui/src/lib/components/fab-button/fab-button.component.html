@if (isOpen() && effectiveBackdrop()) {
  <div
    class="nui-fab__backdrop"
    aria-hidden="true"
    (click)="close()"
    (pointerdown)="$event.stopPropagation()"
  ></div>
}

<div
  class="nui-fab__container"
  [ngClass]="containerClasses()"
  [style.--nui-fab-spacing]="spacing() ?? null"
  [style.--nui-fab-radius]="radius() ?? null"
>
  <button
    #triggerBtn
    class="nui-fab__trigger"
    type="button"
    [disabled]="disabled()"
    [attr.aria-expanded]="isOpen()"
    [attr.aria-controls]="itemsId"
    [attr.aria-label]="triggerAriaLabel()"
    (click)="handleTriggerClick()"
  >
    <i [class]="triggerIcon()" class="nui-fab__trigger-icon" aria-hidden="true"></i>
  </button>

  <ul
    class="nui-fab__items"
    role="menu"
    [id]="itemsId"
    [attr.aria-hidden]="!isOpen()"
    [attr.aria-label]="ariaLabel()"
  >
    @for (item of resolvedItems(); track trackItem($index, item)) {
      <li
        class="nui-fab__item"
        [class.nui-fab__item--visible]="isOpen()"
        [class.nui-fab__item--tooltip-top]="item.tooltipSide === 'top'"
        [class.nui-fab__item--tooltip-right]="item.tooltipSide === 'right'"
        [class.nui-fab__item--tooltip-bottom]="item.tooltipSide === 'bottom'"
        [class.nui-fab__item--tooltip-left]="item.tooltipSide === 'left'"
        [style.--nui-fab-item-tx]="item.tx"
        [style.--nui-fab-item-ty]="item.ty"
        [style.--nui-fab-item-index]="item.index"
        role="none"
      >
        @if (item.url) {
          <a
            class="nui-fab__item-btn"
            [class]="item.styleClass ?? null"
            [class.nui-fab__item-btn--disabled]="item.disabled"
            [class.nui-fab__item-btn--custom-colors]="item.backgroundColor || item.textColor"
            [attr.href]="item.disabled ? null : item.url"
            [attr.target]="item.target ?? null"
            [attr.role]="'menuitem'"
            [attr.aria-label]="item.tooltip || item.label || null"
            [attr.aria-disabled]="item.disabled || null"
            [attr.data-color]="item.color ?? null"
            [attr.data-size]="item.size ?? null"
            [attr.data-variant]="item.variant ?? null"
            [style.--nui-fab-item-bg]="item.backgroundColor ?? null"
            [style.--nui-fab-item-color]="item.textColor ?? null"
            (click)="handleItemClick(item, $event)"
          >
            @if (item.icon) {
              <i [class]="item.icon" aria-hidden="true"></i>
            }
            @if (item.label) {
              <span class="nui-fab__item-label">{{ item.label }}</span>
            }
          </a>
        } @else {
          <button
            class="nui-fab__item-btn"
            [class]="item.styleClass ?? null"
            [class.nui-fab__item-btn--disabled]="item.disabled"
            [class.nui-fab__item-btn--custom-colors]="item.backgroundColor || item.textColor"
            type="button"
            [disabled]="item.disabled"
            [attr.role]="'menuitem'"
            [attr.aria-label]="item.tooltip || item.label || null"
            [attr.data-color]="item.color ?? null"
            [attr.data-size]="item.size ?? null"
            [attr.data-variant]="item.variant ?? null"
            [style.--nui-fab-item-bg]="item.backgroundColor ?? null"
            [style.--nui-fab-item-color]="item.textColor ?? null"
            (click)="handleItemClick(item, $event)"
          >
            @if (item.icon) {
              <i [class]="item.icon" aria-hidden="true"></i>
            }
            @if (item.label) {
              <span class="nui-fab__item-label">{{ item.label }}</span>
            }
          </button>
        }

        @if (item.tooltip) {
          <span class="nui-fab__item-tooltip" aria-hidden="true">
            {{ item.tooltip }}
          </span>
        }
      </li>
    }
  </ul>
</div>
